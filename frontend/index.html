<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Device Checker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #00C9FF, #92FE9D);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 450px;
            transition: max-width 0.5s ease-in-out;
            overflow: hidden;
        }

        .card-container.expanded {
            max-width: 900px;
            flex-direction: row;
        }

        .form-panel {
            padding: 40px 30px;
            width: 100%;
            flex: 1;
            min-width: 350px;
        }

        .result-panel {
            background: #f8f9fa;
            padding: 40px 30px;
            width: 100%;
            flex: 1;
            border-left: 1px solid #eee;
            display: none;
            overflow-y: auto;
            max-height: 90vh;
        }

        .card-container.expanded .result-panel {
            display: block;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Элементы формы */
        h2 { text-align: center; margin-bottom: 25px; color: #1e3c72; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #555; }
        input {
            width: 100%; padding: 12px 15px; border: 2px solid #e1e1e1;
            border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.3s;
        }
        input:focus { border-color: #2a5298; }
        button {
            width: 100%; padding: 14px; background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: transform 0.1s, box-shadow 0.3s;
        }
        button:hover { box-shadow: 0 5px 15px rgba(42, 82, 152, 0.4); }
        button:active { transform: scale(0.98); }

        .loader {
            display: none; border: 4px solid rgba(0, 0, 0, 0.1); border-left-color: #2a5298;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .device-header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #ddd;
        }
        .device-img { max-width: 100px; max-height: 120px; object-fit: contain; }
        .device-title { font-size: 20px; font-weight: bold; color: #1e3c72; }
        
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 14px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #666; }
        .info-value { font-weight: 500; color: #222; text-align: right; max-width: 60%; word-break: break-word; }

        .badge {
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; display: inline-block;
        }
        .badge.green { background-color: #4CAF50; }
        .badge.red { background-color: #F44336; }
        .badge.gray { background-color: #9e9e9e; }

        .error-box {
            background: #fff0f0; border-radius: 10px; padding: 15px;
            border-left: 5px solid #ff4d4d; color: #d63031; margin-top: 20px; display: none;
        }

        @media (max-width: 768px) {
            .card-container.expanded { flex-direction: column; max-width: 450px; }
            .result-panel { border-left: none; border-top: 1px solid #eee; }
            .device-header { flex-direction: column; text-align: center; }
            .info-row { flex-direction: column; align-items: flex-start; gap: 4px; }
            .info-value { text-align: left; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="card-container" id="mainContainer">
        <div class="form-panel">
            <h2>Проверка Apple</h2>
            
            <div class="input-group">
                <label for="token">Ключ доступа (Токен)</label>
                <input type="text" id="token" placeholder="Введите ваш токен">
            </div>

            <div class="input-group">
                <label for="identifier">IMEI или Серийный номер</label>
                <input type="text" id="identifier" placeholder="15 цифр IMEI или SN">
            </div>

            <button id="checkBtn" onclick="checkDevice()">Проверить устройство</button>
            <div id="loader" class="loader"></div>
            <div id="errorBox" class="error-box"></div>
        </div>

        <div class="result-panel" id="resultPanel">
            </div>
    </div>

    <script>
        function getBadge(isPositive, trueText, falseText) {
            if (isPositive) {
                return `<span class="badge green">${trueText}</span>`;
            } else {
                return `<span class="badge red">${falseText}</span>`;
            }
        }

        function getStringBadge(statusStr, goodWord) {
            if (!statusStr) return `<span class="badge gray">UNKNOWN</span>`;
            if (statusStr.toUpperCase().includes(goodWord.toUpperCase())) {
                return `<span class="badge green">${statusStr.toUpperCase()}</span>`;
            }
            return `<span class="badge red">${statusStr.toUpperCase()}</span>`;
        }

        async function checkDevice() {
            const tokenInput = document.getElementById('token').value.trim();
            const identifierInput = document.getElementById('identifier').value.trim();
            
            const container = document.getElementById('mainContainer');
            const resultPanel = document.getElementById('resultPanel');
            const errorBox = document.getElementById('errorBox');
            const loader = document.getElementById('loader');
            const checkBtn = document.getElementById('checkBtn');

            if (!tokenInput || !identifierInput) {
                showError("Пожалуйста, заполните оба поля.");
                return;
            }

            errorBox.style.display = 'none';
            container.classList.remove('expanded');
            checkBtn.disabled = true;
            checkBtn.style.opacity = '0.7';
            loader.style.display = 'block';

            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: tokenInput, identifier: identifierInput })
                });

                const data = await response.json();

                loader.style.display = 'none';
                checkBtn.disabled = false;
                checkBtn.style.opacity = '1';

                if (data.status === 'error') {
                    showError(data.massage);
                } else if (data.status === 'success') {
                    showSuccess(data.data, container, resultPanel);
                }
            } catch (error) {
                loader.style.display = 'none';
                checkBtn.disabled = false;
                checkBtn.style.opacity = '1';
                showError("Ошибка сети. Сервер недоступен.");
            }
        }

        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerHTML = `<b>Ошибка:</b> ${message}`;
            errorBox.style.display = 'block';
        }

        function showSuccess(obj, container, resultPanel) {
            resultPanel.innerHTML = `
                <div class="device-header">
                    ${obj.thumbnail ? `<img src="${obj.thumbnail}" class="device-img" alt="Device">` : ''}
                    <div class="device-title">${obj.modelDesc || obj.model || "Apple Device"}</div>
                </div>

                <div class="info-row"><span class="info-label">Model:</span> <span class="info-value">${obj.model || '-'}</span></div>
                <div class="info-row"><span class="info-label">Network:</span> <span class="info-value">${obj.network || '-'}</span></div>
                <div class="info-row"><span class="info-label">IMEI Number:</span> <span class="info-value">${obj.imei || '-'}</span></div>
                <div class="info-row"><span class="info-label">Serial Number:</span> <span class="info-value">${obj.serial || '-'}</span></div>
                <div class="info-row"><span class="info-label">Warranty Status:</span> <span class="info-value">${obj.warrantyStatus || '-'}</span></div>
                <div class="info-row"><span class="info-label">Est. Purchase Date:</span> <span class="info-value">${obj.estPurchaseDate || '-'}</span></div>
                
                <br>
                <div class="info-row"><span class="info-label">Tech Support:</span> <span class="info-value">${getBadge(obj.technicalSupport, 'ACTIVE', 'EXPIRED')}</span></div>
                <div class="info-row"><span class="info-label">Repairs & Service:</span> <span class="info-value">${getBadge(obj.repairCoverage, 'ACTIVE', 'EXPIRED')}</span></div>
                <div class="info-row"><span class="info-label">Replaced by Apple:</span> <span class="info-value">${getBadge(!obj.replaced, 'NO', 'YES')}</span></div>
                <div class="info-row"><span class="info-label">Replacement Device:</span> <span class="info-value">${getBadge(!obj.replacement, 'NO', 'YES')}</span></div>
                <div class="info-row"><span class="info-label">Refurbished:</span> <span class="info-value">${getBadge(!obj.refurbished, 'NO', 'YES')}</span></div>
                <div class="info-row"><span class="info-label">Demo Unit:</span> <span class="info-value">${getBadge(!obj.demoUnit, 'NO', 'YES')}</span></div>
                <div class="info-row"><span class="info-label">Loaner Device:</span> <span class="info-value">${getBadge(!obj.loaner, 'NO', 'YES')}</span></div>
                
                <br>
                <div class="info-row"><span class="info-label">Find My iPhone:</span> <span class="info-value">${getBadge(!obj.fmiOn, 'OFF', 'ON')}</span></div>
                <div class="info-row"><span class="info-label">US Block Status:</span> <span class="info-value">${getStringBadge(obj.usaBlockStatus, 'CLEAN')}</span></div>
                <div class="info-row"><span class="info-label">SIM-Lock Status:</span> <span class="info-value">${getBadge(!obj.simLock, 'UNLOCKED', 'LOCKED')}</span></div>
            `;

            container.classList.add('expanded');
        }
    </script>
</body>
</html>
