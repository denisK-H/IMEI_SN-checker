version: '3.8'
services:
  backend:
    build: .
    container_name: imei_backend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env
      - ./tokens.db:/app/tokens.db
    environment:
      - TZ=Europe/Moscow

  nginx:
    image: nginx:alpine
    container_name: imei_frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend